<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">GuardGuide social preview</title>
  <desc id="desc">Social preview card for GuardGuide with product name, tagline, and the canonical mark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081019" />
      <stop offset="55%" stop-color="#0f1f2f" />
      <stop offset="100%" stop-color="#18364a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(125,211,252,0.10)" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6" />
  <circle cx="1050" cy="110" r="220" fill="#38bdf8" opacity="0.10" />
  <circle cx="160" cy="560" r="210" fill="#7dd3fc" opacity="0.08" />
  <rect x="72" y="72" width="1056" height="486" rx="32" fill="rgba(8,16,25,0.36)" stroke="rgba(125,211,252,0.18)" stroke-width="2" />

  <rect x="112" y="118" width="455" height="40" rx="20" fill="rgba(125,211,252,0.12)" stroke="rgba(125,211,252,0.28)" />
  <text x="144" y="144" fill="#d7f3ff" font-size="20" font-family="Segoe UI, Noto Sans, Helvetica, Arial, sans-serif" letter-spacing="0.08em">OPEN SOURCE · BUILT IN PUBLIC</text>

  <text x="112" y="286" fill="#ffffff" font-size="104" font-weight="700" font-family="Segoe UI, Noto Sans, Helvetica, Arial, sans-serif">GuardGuide</text>
  <text x="112" y="344" fill="#8bdcff" font-size="40" font-weight="600" font-family="Segoe UI, Noto Sans, Helvetica, Arial, sans-serif">Operations software for private security services</text>

  <text x="112" y="426" fill="#e2edf6" font-size="32" font-family="Segoe UI, Noto Sans, Helvetica, Arial, sans-serif">Less paperwork. Fewer disconnected tools.</text>
  <text x="112" y="470" fill="#e2edf6" font-size="32" font-family="Segoe UI, Noto Sans, Helvetica, Arial, sans-serif">Clearer workflows for security operations.</text>

  <rect x="112" y="500" width="252" height="36" rx="18" fill="url(#accent)" opacity="0.96" />
  <text x="138" y="524" fill="#081019" font-size="24" font-weight="700" font-family="Segoe UI, Noto Sans, Helvetica, Arial, sans-serif" letter-spacing="0.02em">guardguide.de</text>

  <g transform="translate(764 76)">
    <circle cx="180" cy="180" r="170" fill="rgba(125,211,252,0.06)" />
    <circle cx="180" cy="180" r="144" fill="rgba(9,19,29,0.78)" stroke="rgba(125,211,252,0.18)" stroke-width="2" />
    <circle cx="180" cy="180" r="112" fill="url(#accent)" opacity="0.07" />
    <image x="62" y="70" width="236" height="236" href="logo-dark-512.png" preserveAspectRatio="xMidYMid meet" />
  </g>
</svg>
