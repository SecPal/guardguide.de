SPDX-License-Identifier = "AGPL-3.0-or-later"

[[annotations]]
path = [
  "astro.config.mjs",
  "tsconfig.json",
  "eslint.config.js",
  ".prettierrc.json",
  ".prettierignore",
  ".editorconfig",
  ".gitignore",
  ".gitattributes",
  ".nvmrc",
  ".yamllint.yml",
  ".markdownlint.json",
  ".markdownlint-cli2.yaml",
  ".pre-commit-config.yaml",
  "package.json",
  "package-lock.json",
  "CODEOWNERS",
]
