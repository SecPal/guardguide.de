name: CodeQL Advanced Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"

permissions:
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          category: /language:${{ matrix.language }}

  codeql-summary:
    name: CodeQL Summary
    runs-on: ubuntu-latest
    needs: [analyze]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Check CodeQL status
        run: |
          if [ "${{ needs.analyze.result }}" = "success" ] || [ "${{ needs.analyze.result }}" = "skipped" ]; then
            echo "CodeQL check passed"
            exit 0
          fi

          echo "CodeQL analysis failed"
          exit 1
